<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
<title id="title">Placeholder ionogram</title>
<desc id="desc">A stylized MARSIS ionogram showing a nightside ionospheric trace.</desc>
<rect width="900" height="560" fill="#111520"/>
<g stroke="#f4f0e8" stroke-opacity=".13">
  <path d="M90 70V470M210 70V470M330 70V470M450 70V470M570 70V470M690 70V470M810 70V470"/>
  <path d="M90 70H810M90 150H810M90 230H810M90 310H810M90 390H810M90 470H810"/>
</g>
<g filter="url(#glow)">
  <path d="M115 430 C190 390 238 350 300 307 C380 250 470 245 575 230 C650 219 708 190 780 146" fill="none" stroke="#f09b6e" stroke-width="5" stroke-linecap="round"/>
  <path d="M150 390 C228 355 295 326 368 305 C462 278 555 277 660 253" fill="none" stroke="#91b7ff" stroke-width="3" stroke-linecap="round" opacity=".8"/>
</g>
<defs><filter id="glow"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
<g fill="#f4f0e8" font-family="Inter, system-ui, sans-serif">
  <text x="90" y="42" font-size="22" font-weight="700">MARSIS AIS ionogram example</text>
  <text x="90" y="510" font-size="14" opacity=".72">Frequency</text>
  <text x="28" y="288" font-size="14" opacity=".72" transform="rotate(-90 28 288)">Delay time</text>
</g>
</svg>
