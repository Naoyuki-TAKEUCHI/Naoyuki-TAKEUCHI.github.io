<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
<title id="title">Placeholder for NGIMS ion density altitude profiles</title>
<desc id="desc">Stylized altitude profiles for multiple ion species observed by MAVEN NGIMS.</desc>
<rect width="900" height="560" fill="#fffdf8"/>
<g stroke="#1d2430" stroke-opacity=".14">
  <path d="M110 70V460M250 70V460M390 70V460M530 70V460M670 70V460M810 70V460"/>
  <path d="M110 460H810M110 382H810M110 304H810M110 226H810M110 148H810M110 70H810"/>
</g>
<g fill="none" stroke-linecap="round" stroke-width="5">
  <path d="M150 420 C280 368 350 318 423 255 C480 205 545 172 690 118" stroke="#b45532"/>
  <path d="M134 440 C220 390 310 365 378 318 C450 270 490 220 560 165" stroke="#263f70"/>
  <path d="M122 445 C170 395 212 370 280 345 C356 318 418 284 495 238" stroke="#8a6f3e"/>
  <path d="M118 452 C175 430 245 410 330 365 C400 328 470 320 610 286" stroke="#7a91b6"/>
</g>
<g font-family="Inter, system-ui, sans-serif" fill="#1d2430">
  <text x="110" y="42" font-size="22" font-weight="700">NGIMS nightside ion composition</text>
  <text x="110" y="504" font-size="14" fill="#667085">Density [cm⁻³], log scale</text>
  <text x="35" y="300" font-size="14" fill="#667085" transform="rotate(-90 35 300)">Altitude [km]</text>
  <text x="690" y="118" font-size="14" fill="#b45532">O₂⁺</text>
  <text x="560" y="165" font-size="14" fill="#263f70">CO₂⁺</text>
  <text x="495" y="238" font-size="14" fill="#8a6f3e">O⁺</text>
  <text x="610" y="286" font-size="14" fill="#7a91b6">NO⁺</text>
</g>
</svg>
